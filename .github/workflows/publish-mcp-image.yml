name: Publish MCP Image

on:
  push:
    branches: [main]
    paths:
      - "mcp_server/**"
      - ".github/workflows/publish-mcp-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-mcp-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: thienpvt/graphiti-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Extract versions
        id: versions
        shell: bash
        run: |
          python <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import tomllib

          project = tomllib.loads(pathlib.Path('mcp_server/pyproject.toml').read_text())
          lock = tomllib.loads(pathlib.Path('mcp_server/uv.lock').read_text())
          graphiti = next(package for package in lock['package'] if package['name'] == 'graphiti-core')
          print(f"mcp={project['project']['version']}")
          print(f"graphiti={graphiti['version']}")
          PY
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@263435318d21b8e681c14492fe198d362a7d2c83 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Verify Docker build
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v6.18.0
        with:
          context: ./mcp_server
          file: ./mcp_server/docker/Dockerfile.standalone
          platforms: linux/amd64
          push: false
          build-args: |
            MCP_SERVER_VERSION=${{ steps.versions.outputs.mcp }}
            GRAPHITI_CORE_VERSION=${{ steps.versions.outputs.graphiti }}
            BUILD_DATE=${{ steps.versions.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        if: github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=standalone
            type=raw,value=${{ steps.versions.outputs.mcp }}-standalone
          labels: |
            org.opencontainers.image.title=Graphiti MCP Server (Standalone)
            org.opencontainers.image.description=Standalone Graphiti MCP server for external Neo4j or FalkorDB
            org.opencontainers.image.version=${{ steps.versions.outputs.mcp }}
            graphiti.core.version=${{ steps.versions.outputs.graphiti }}

      - name: Build and push standalone image
        if: github.ref == 'refs/heads/main'
        id: build
        uses: docker/build-push-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v6.18.0
        with:
          context: ./mcp_server
          file: ./mcp_server/docker/Dockerfile.standalone
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MCP_SERVER_VERSION=${{ steps.versions.outputs.mcp }}
            GRAPHITI_CORE_VERSION=${{ steps.versions.outputs.graphiti }}
            BUILD_DATE=${{ steps.versions.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        if: github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          MCP_VERSION: ${{ steps.versions.outputs.mcp }}
        run: |
          {
            echo "## Graphiti MCP image"
            echo
            echo "- Image: \`${REGISTRY}/${IMAGE_NAME}\`"
            echo "- Digest: \`${DIGEST}\`"
            echo "- Platforms: \`linux/amd64\`, \`linux/arm64\`"
            echo "- Immutable tag: \`sha-${GITHUB_SHA}\`"
            if [ "$GITHUB_REF" = "refs/heads/main" ]; then
              echo "- Main tags: \`standalone\`, \`${MCP_VERSION}-standalone\`"
            fi
            echo
            echo "\`docker pull ${REGISTRY}/${IMAGE_NAME}@${DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"
