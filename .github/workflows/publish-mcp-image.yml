name: Publish MCP Image

on:
  push:
    branches: [main]
    paths:
      - "graphiti_core/**"
      - "mcp_server/**"
      - "pyproject.toml"
      - ".github/workflows/publish-mcp-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-mcp-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: thienpvt/graphiti-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Extract versions
        id: versions
        shell: bash
        run: |
          python <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import tomllib

          mcp = tomllib.loads(pathlib.Path('mcp_server/pyproject.toml').read_text())
          graphiti = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(f"mcp={mcp['project']['version']}")
          print(f"graphiti={graphiti['project']['version']}")
          PY
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Verify Docker build
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./mcp_server/docker/Dockerfile.standalone
          platforms: linux/amd64
          push: false
          load: true
          tags: graphiti-mcp:ci
          build-args: |
            MCP_SERVER_VERSION=${{ steps.versions.outputs.mcp }}
            BUILD_DATE=${{ steps.versions.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify graphiti-core source
        if: github.ref != 'refs/heads/main'
        run: |
          docker run --rm graphiti-mcp:ci /app/mcp/.venv/bin/python -c '
          import importlib.metadata
          import inspect
          import json
          from pathlib import Path
          from graphiti_core.embedder.openai import OpenAIEmbedder

          distribution = importlib.metadata.distribution("graphiti-core")
          direct_url = json.loads(distribution.read_text("direct_url.json"))
          assert direct_url["url"] == "file:///app", direct_url

          create_source = inspect.getsource(OpenAIEmbedder.create)
          batch_source = inspect.getsource(OpenAIEmbedder.create_batch)
          assert "encoding_format=\x27float\x27" in create_source
          assert "encoding_format=\x27float\x27" in batch_source

          lock = Path("/app/mcp/uv.lock").read_text()
          package = lock.split("[[package]]\nname = \x22graphiti-core\x22", 1)[1]
          package = package.split("[[package]]", 1)[0]
          assert "source = { directory = \x22../\x22 }" in package, package
          assert "registry = \x22https://pypi.org/simple\x22" not in package, package
          print(direct_url)
          print(inspect.getfile(OpenAIEmbedder))
          '

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        if: github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=standalone
            type=raw,value=${{ steps.versions.outputs.mcp }}-standalone
          labels: |
            org.opencontainers.image.title=Graphiti MCP Server (Standalone)
            org.opencontainers.image.description=Standalone Graphiti MCP server for external Neo4j or FalkorDB
            org.opencontainers.image.version=${{ steps.versions.outputs.mcp }}
            graphiti.core.version=${{ steps.versions.outputs.graphiti }}

      - name: Build and push standalone image
        if: github.ref == 'refs/heads/main'
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./mcp_server/docker/Dockerfile.standalone
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MCP_SERVER_VERSION=${{ steps.versions.outputs.mcp }}
            BUILD_DATE=${{ steps.versions.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        if: github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          MCP_VERSION: ${{ steps.versions.outputs.mcp }}
        run: |
          {
            echo "## Graphiti MCP image"
            echo
            echo "- Image: \`${REGISTRY}/${IMAGE_NAME}\`"
            echo "- Digest: \`${DIGEST}\`"
            echo "- Platform: \`linux/amd64\`"
            echo "- Immutable tag: \`sha-${GITHUB_SHA}\`"
            if [ "$GITHUB_REF" = "refs/heads/main" ]; then
              echo "- Main tags: \`standalone\`, \`${MCP_VERSION}-standalone\`"
            fi
            echo
            echo "\`docker pull ${REGISTRY}/${IMAGE_NAME}@${DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"
