# Neo4j remains cluster-internal. Graphiti MCP is exposed on every node at port 30080.
# Security: NodePort provides no TLS or application authentication. Restrict it with a
# firewall/VPN, or replace it with an authenticated TLS ingress before internet exposure.
# Keep Neo4j at one replica. Confirm nfs01 supports the locking and fsync semantics Neo4j needs.
#
# Create the namespace and credentials before applying this manifest:
# kubectl create namespace graphiti --dry-run=client -o yaml | kubectl apply -f -


apiVersion: v1
kind: Namespace
metadata:
  name: graphiti
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: graphiti-catalog-upsert
  namespace: graphiti
data:
  CATALOG_UPSERT_ENABLED: "true"
  GRAPHITI_CATALOG_UUID_NAMESPACE: "36238153-0471-4c37-ac23-9f662c413f2c"
  CATALOG_MAX_ENTITIES_PER_BATCH: "500"
  CATALOG_MAX_EDGES_PER_BATCH: "2000"
  CATALOG_MAX_PROVENANCE_LINKS_PER_BATCH: "5000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: graphiti-mcp-config
  namespace: graphiti
data:
  config.yaml: |
    server:
      transport: "http"
      host: "0.0.0.0"
      port: 8000

    llm:
      provider: "openai"
      model: ${MODEL_NAME:xai/grok-4.5}
      max_tokens: 200000

      providers:
        openai:
          api_key: ${OPENAI_API_KEY}
          api_url: ${OPENAI_API_URL:http://router9.shb-smartcard.svc.cluster.local:20128/v1}
          organization_id: ${OPENAI_ORGANIZATION_ID:}

        azure_openai:
          api_key: ${AZURE_OPENAI_API_KEY}
          api_url: ${AZURE_OPENAI_ENDPOINT}
          api_version: ${AZURE_OPENAI_API_VERSION:2024-10-21}
          deployment_name: ${AZURE_OPENAI_DEPLOYMENT}
          use_azure_ad: ${USE_AZURE_AD:false}

        anthropic:
          api_key: ${ANTHROPIC_API_KEY}
          api_url: ${ANTHROPIC_API_URL:https://api.anthropic.com}
          max_retries: 3

        gemini:
          api_key: ${GOOGLE_API_KEY}
          project_id: ${GOOGLE_PROJECT_ID:}
          location: ${GOOGLE_LOCATION:us-central1}

        groq:
          api_key: ${GROQ_API_KEY}
          api_url: ${GROQ_API_URL:https://api.groq.com/openai/v1}

    embedder:
      provider: "openai"
      model: ${EMBEDDER_MODEL:openrouter/nvidia/llama-nemotron-embed-vl-1b-v2:free}
      dimensions: ${EMBEDDER_DIMENSIONS:1536}

      providers:
        openai:
          api_key: ${OPENAI_EMBEDDER_API_KEY}
          api_url: ${OPENAI_EMBEDDER_API_URL:http://router9.shb-smartcard.svc.cluster.local:20128/v1}
          organization_id: ${OPENAI_ORGANIZATION_ID}

        azure_openai:
          api_key: ${AZURE_OPENAI_API_KEY}
          api_url: ${AZURE_OPENAI_EMBEDDINGS_ENDPOINT}
          api_version: ${AZURE_OPENAI_API_VERSION:2024-10-21}
          deployment_name: ${AZURE_OPENAI_EMBEDDINGS_DEPLOYMENT}
          use_azure_ad: ${USE_AZURE_AD:false}

        gemini:
          api_key: ${GOOGLE_API_KEY}
          project_id: ${GOOGLE_PROJECT_ID:}
          location: ${GOOGLE_LOCATION:us-central1}

        voyage:
          api_key: ${VOYAGE_API_KEY}
          api_url: ${VOYAGE_API_URL:https://api.voyageai.com/v1}
          model: "voyage-3"

        ollama:
          api_url: ${OLLAMA_EMBEDDER_API_URL:https://ollama.com}
          api_key: ${OLLAMA_API_KEY:}
          truncate: ${OLLAMA_EMBEDDER_TRUNCATE:true}
          keep_alive: ${OLLAMA_EMBEDDER_KEEP_ALIVE:}
          timeout: ${OLLAMA_EMBEDDER_TIMEOUT:60}

    database:
      provider: "neo4j"

      providers:
        neo4j:
          uri: ${NEO4J_URI:bolt://neo4j:7687}
          username: ${NEO4J_USER:neo4j}
          password: ${NEO4J_PASSWORD}
          database: ${NEO4J_DATABASE:neo4j}
          use_parallel_runtime: ${USE_PARALLEL_RUNTIME:false}

    catalog_upsert:
      enabled: ${CATALOG_UPSERT_ENABLED:false}
      uuid_namespace: ${GRAPHITI_CATALOG_UUID_NAMESPACE}
      max_entities_per_batch: ${CATALOG_MAX_ENTITIES_PER_BATCH:500}
      max_edges_per_batch: ${CATALOG_MAX_EDGES_PER_BATCH:2000}
      max_provenance_links_per_batch: ${CATALOG_MAX_PROVENANCE_LINKS_PER_BATCH:5000}

    graphiti:
      group_id: ${GRAPHITI_GROUP_ID:oracle-core}
      episode_id_prefix: ${EPISODE_ID_PREFIX:}
      user_id: ${USER_ID:mcp_user}
      entity_types:
      - name: Database
        description: >
          A relational database system or database instance.

      - name: Schema
        description: >
          A database schema or owner. Use the exact schema name.

      - name: Table
        description: >
          A physical relational database table. Use schema-qualified canonical
          name such as APP.NTF_SCHEME_EVENT.

      - name: View
        description: >
          A database view or materialized view. Preserve its schema-qualified name.

      - name: Column
        description: >
          A table or view column. Canonical name must include schema, table and
          column, for example APP.NTF_SCHEME_EVENT.SCHEME_ID.

      - name: Package
        description: >
          An Oracle PL/SQL package. Use schema-qualified package name.

      - name: Procedure
        description: >
          A standalone procedure or a procedure declared inside an Oracle package.

      - name: Function
        description: >
          A standalone function or a function declared inside an Oracle package.

      - name: Trigger
        description: >
          An Oracle database trigger attached to a table, view or schema.

      - name: Constraint
        description: >
          A primary key, foreign key, unique, check or not-null constraint.

      - name: Index
        description: >
          A database index including unique and function-based indexes.

      - name: DictionaryDocument
        description: >
          A source data-dictionary document containing descriptions and documented
          database relationships.

      edge_types:
        - name: Contains
          description: >
            Structural containment such as Schema contains Table, Table contains
            Column, or Package contains Procedure.

        - name: PrimaryKeyOf
          description: >
            A constraint or column is the declared primary key of a table.

        - name: ForeignKeyTo
          description: >
            A declared database foreign key supported by DDL or constraint metadata.

        - name: ReferencesByCode
          description: >
            A logical reference inferred from SQL or PL/SQL without a declared
            database foreign key.

        - name: ReadsFrom
          description: >
            A package, procedure, function, trigger or view reads from a table or view.

        - name: WritesTo
          description: >
            A package, procedure, function or trigger inserts, updates, deletes or
            merges data in a table.

        - name: JoinsWith
          description: >
            Two tables or views are joined in executable SQL using one or more columns.

        - name: Calls
          description: >
            A package, procedure, function or trigger calls another executable object.

        - name: DependsOn
          description: >
            A database object depends on another database object.

        - name: DerivedFrom
          description: >
            A view, materialized view, output column or table value is derived from
            another database object.

        - name: DocumentedBy
          description: >
            A database entity is described by a source dictionary document.

      edge_type_map:
        - source: Schema
          target: Table
          edge_types: [Contains]

        - source: Schema
          target: View
          edge_types: [Contains]

        - source: Schema
          target: Package
          edge_types: [Contains]

        - source: Table
          target: Column
          edge_types: [Contains]

        - source: View
          target: Column
          edge_types: [Contains]

        - source: Package
          target: Procedure
          edge_types: [Contains]

        - source: Package
          target: Function
          edge_types: [Contains]

        - source: Constraint
          target: Table
          edge_types: [PrimaryKeyOf]

        - source: Column
          target: Column
          edge_types: [ForeignKeyTo, ReferencesByCode]

        - source: Procedure
          target: Table
          edge_types: [ReadsFrom, WritesTo]

        - source: Function
          target: Table
          edge_types: [ReadsFrom, WritesTo]

        - source: Trigger
          target: Table
          edge_types: [ReadsFrom, WritesTo]

        - source: Table
          target: Table
          edge_types: [JoinsWith, DependsOn]

        - source: View
          target: Table
          edge_types: [ReadsFrom, DerivedFrom, DependsOn]

        - source: Entity
          target: DictionaryDocument
          edge_types: [DocumentedBy]

        - source: Entity
          target: Entity
          edge_types: [DependsOn, Calls]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-data
  namespace: graphiti
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs01
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-logs
  namespace: graphiti
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs01
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: graphiti
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120
      containers:
        - name: neo4j
          image: neo4j:5.26.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7474
            - name: bolt
              containerPort: 7687
          env:
            - name: NEO4J_server_config_strict__validation_enabled
              value: "false"
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: graphiti-secrets
                  key: NEO4J_USER
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: graphiti-secrets
                  key: NEO4J_PASSWORD
            - name: NEO4J_AUTH
              value: "$(NEO4J_USER)/$(NEO4J_PASSWORD)"
            - name: NEO4J_server_memory_heap_initial__size
              value: 512m
            - name: NEO4J_server_memory_heap_max__size
              value: 1G
            - name: NEO4J_server_memory_pagecache_size
              value: 512m
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 3Gi
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: neo4j-data
        - name: logs
          persistentVolumeClaim:
            claimName: neo4j-logs
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: graphiti
spec:
  type: ClusterIP
  selector:
    app: neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: bolt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphiti-mcp
  namespace: graphiti
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graphiti-mcp
  template:
    metadata:
      labels:
        app: graphiti-mcp
    spec:
      automountServiceAccountToken: false
      containers:
        - name: graphiti-mcp
          image: ghcr.io/thienpvt/graphiti-mcp:sha-f689d3732dd2264c189a58ee00cd7b9921e3b5a6
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: graphiti-catalog-upsert
          env:
            - name: MAX_TOKENS
              value: '100000'
            - name: FASTMCP_HTTP_ALLOWED_HOSTS
              value: '["10.4.97.70:30080","localhost:*","127.0.0.1:*"]'
            - name: NEO4J_URI
              value: 'bolt://neo4j:7687'
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: graphiti-secrets
                  key: NEO4J_USER
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: graphiti-secrets
                  key: NEO4J_PASSWORD
            - name: NEO4J_DATABASE
              value: 'neo4j'
            - name: SEMAPHORE_LIMIT
              value: "10"
            - name: CONFIG_PATH
              value: '/app/mcp/config/config.yaml'
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: graphiti-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_EMBEDDER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: graphiti-secrets
                  key: OPENAI_EMBEDDER_API_KEY
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: graphiti-secrets
                  key: OLLAMA_API_KEY
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/mcp/config/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: graphiti-mcp-config
---
apiVersion: v1
kind: Service
metadata:
  name: graphiti-mcp
  namespace: graphiti
spec:
  type: NodePort
  selector:
    app: graphiti-mcp
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30080
