server:
  transport: "http"
  host: "0.0.0.0"
  port: 8000

llm:
  provider: "openai"
  model: ${MODEL_NAME:gpt-4.1-mini}
  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      api_url: ${OPENAI_API_URL:https://api.openai.com/v1}

embedder:
  provider: "ollama"
  model: ${EMBEDDER_MODEL:qwen3-embedding:0.6b}
  dimensions: ${EMBEDDER_DIMENSIONS:1024}
  providers:
    ollama:
      api_url: ${OLLAMA_EMBEDDER_API_URL:http://host.docker.internal:11434}
      truncate: ${OLLAMA_EMBEDDER_TRUNCATE:true}
      keep_alive: ${OLLAMA_EMBEDDER_KEEP_ALIVE:}
      timeout: ${OLLAMA_EMBEDDER_TIMEOUT:60}

database:
  provider: "neo4j"
  providers:
    neo4j:
      uri: ${NEO4J_URI:bolt://neo4j:7687}
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD}
      database: ${NEO4J_DATABASE:neo4j}

catalog_upsert:
  enabled: true
  reads_enabled: true
  uuid_namespace: ${GRAPHITI_CATALOG_UUID_NAMESPACE}
